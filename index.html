  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkfield Genesis</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080c1e; }
    canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 10vh;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
      background: radial-gradient(ellipse 50% 35% at center 85%, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
    }
    #overlay.visible { opacity: 1; }
    #wordmark {
      --logo-h: 56px;
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      padding: 24px 60px 32px;
      opacity: 0;
      transition: opacity 1.5s ease;
      background: radial-gradient(ellipse 160px 50px at center 24px, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 40%, transparent 100%);
    }
    #wordmark.visible { opacity: 1; }
    @media (min-width: 768px) { #wordmark { --logo-h: 84px; } }
    #cursor {
      animation: blink 0.8s step-end infinite;
      color: rgba(255,255,255,0.7);
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .headline {
      font: italic 300 clamp(28px, 5vw, 56px)/1.15 Georgia, 'Iowan Old Style', 'Palatino Linotype', Palatino, serif;
      color: white;
      text-align: center;
      text-shadow: 0 2px 40px rgba(0,0,0,0.6);
      margin-bottom: 28px;
    }
    .cta-row { display: flex; gap: 16px; pointer-events: auto; }
    .cta-primary {
      padding: 14px 32px; border: none; border-radius: 10px;
      background: #d4a040; color: #1a1030;
      font: 600 16px/1 Georgia, 'Palatino Linotype', Palatino, serif; cursor: pointer; letter-spacing: 0.02em;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .cta-secondary {
      padding: 14px 32px; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px;
      background: transparent; color: white;
      font: 600 16px/1 Georgia, 'Palatino Linotype', Palatino, serif; cursor: pointer; letter-spacing: 0.02em;
      transition: border-color 120ms ease;
    }
    .cta-secondary:hover { border-color: rgba(255,255,255,0.6); }
    #attribution {
      position: fixed;
      bottom: 12px;
      right: 16px;
      z-index: 2;
      font: 300 11px/1.4 'Readex Pro', 'Helvetica Neue', sans-serif;
      color: rgba(255,255,255,0.5);
      text-align: right;
      opacity: 0;
      transition: opacity 0.8s ease;
      background: radial-gradient(ellipse 120px 30px at center, rgba(0,0,0,0.4) 0%, transparent 100%);
      padding: 6px 12px;
    }
    #attribution.visible { opacity: 1; }
  </style>

    <h1 class="headline"><span id="typewriter">Where </span><span id="cursor">|</span></h1>
    <div style="font: italic 300 clamp(22px, 3.5vw, 36px)/1 Georgia, 'Palatino Linotype', Palatino, serif; color: rgba(255,255,255,0.5); letter-spacing: 0.08em;">Coming soon</div>
  </div>
  

  <script>
    (function() {
      const phrases = [
        'words become worlds',
        'writers become authors',
        'readers become fans',
        'agents find authors',
        'readers become authors',
        'stories find readers',
      ];
      const prefix = 'Where ';
      const el = document.getElementById('typewriter');
      if (!el) return;

      const TYPE_SPEED = 60;
      const DELETE_SPEED = 35;
      const HOLD_TIME = 3000;
      const PAUSE_BEFORE_TYPE = 400;

      let phraseIdx = 0;
      let charIdx = phrases[0].length;
      el.textContent = prefix + phrases[0];

      function nextPhrase() {
        const current = phrases[phraseIdx];
        let i = current.length;

        // Delete current phrase char by char
        function deleteChar() {
          if (i <= 0) {
            phraseIdx = (phraseIdx + 1) % phrases.length;
            setTimeout(typeChar, PAUSE_BEFORE_TYPE);
            return;
          }
          i--;
          el.textContent = prefix + current.slice(0, i);
          setTimeout(deleteChar, DELETE_SPEED);
        }

        // Type next phrase char by char
        let j = 0;
        function typeChar() {
          const next = phrases[phraseIdx];
          if (j >= next.length) {
            setTimeout(nextPhrase, HOLD_TIME);
            return;
          }
          j++;
          el.textContent = prefix + next.slice(0, j);
          setTimeout(typeChar, TYPE_SPEED);
        }

        deleteChar();
      }

      setTimeout(nextPhrase, HOLD_TIME);
    })();
  </script>
